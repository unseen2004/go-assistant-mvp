apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: go-assistant-ingress
  namespace: go-assistant
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: go-assistant.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: go-assistant-service
            port:
              number: 8080
