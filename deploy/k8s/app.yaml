apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-assistant-app
  namespace: go-assistant
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-assistant-app
  template:
    metadata:
      labels:
        app: go-assistant-app
    spec:
      containers:
      - name: app
        image: go-assistant:latest
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: go-assistant-config
        - secretRef:
            name: go-assistant-secrets
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: go-assistant-service
  namespace: go-assistant
spec:
  selector:
    app: go-assistant-app
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: go-assistant-hpa
  namespace: go-assistant
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: go-assistant-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
